node:
  id: esc.hallway
  prompt: "You're in a hallway with three doors. Each has a riddle."
  context: >
    The hallway has three doors, each with a plaque:

    DOOR A (Biology Lab): "I have cities but no houses, forests but no trees,
    and water but no fish. What am I?"

    DOOR B (Chemistry Lab): "The more you take, the more you leave behind.
    What am I?"

    DOOR C (Physics Lab): "I speak without a mouth and hear without ears.
    I have no body, but I come alive with the wind. What am I?"

    You need to solve ALL three riddles to determine the correct order
    to visit the labs. The answers, read as first letters, spell the
    order: visit the lab whose answer starts with the EARLIEST letter
    in the alphabet first.

  evidence_schema:
    answer_a:
      type: text
      required: true
      hint: "Answer to Door A's riddle"
    answer_b:
      type: text
      required: true
      hint: "Answer to Door B's riddle"
    answer_c:
      type: text
      required: true
      hint: "Answer to Door C's riddle"
    visit_order:
      type: text
      required: true
      hint: "Order to visit labs based on alphabetical first letters (e.g., 'C, A, B')"
    first_lab:
      type: enum
      values: ["biology", "chemistry", "physics"]
      required: true
      hint: "Which lab do you visit first?"

  edges:
    - to: esc.biology
      condition: "response.get('first_lab') == 'biology'"
    - to: esc.chemistry
      condition: "response.get('first_lab') == 'chemistry'"
    - to: esc.physics
