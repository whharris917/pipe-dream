node:
  id: cr.checkin-for-review
  prompt: "Checking in document and routing for review."
  context: "The document will be checked in (saving your draft) and then routed for review. Reviewers will be assigned by QA."

  evidence_schema: {}

  hooks:
    on_enter:
      - command: "qms checkin {ticket.doc_id}"
        on_failure: block
      - command: "qms route {ticket.doc_id} --review"
        on_failure: block

  edges:
    - to: cr.assign-reviewers
