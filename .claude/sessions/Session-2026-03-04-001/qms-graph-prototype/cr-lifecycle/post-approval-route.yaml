node:
  id: cr.post-approval-route
  prompt: "Post-review complete. Routing for post-approval."
  context: "All post-reviewers recommend. The CR will now be sent to the approver for final post-approval (version bump to 2.0)."
  performer: initiator

  evidence_schema: {}

  hooks:
    on_enter:
      - command: "qms route {ticket.doc_id} --approval"
        on_failure: block

  edges:
    - to: cr.post-approval-decision
