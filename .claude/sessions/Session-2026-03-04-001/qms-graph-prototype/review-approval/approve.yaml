node:
  id: ra.approve
  prompt: "Approve or reject this document."
  context: "As approver, you have final authority. Approval increments the major version and locks pre-approved content. Rejection returns the document for further revision."
  performer: quality

  evidence_schema:
    decision:
      type: enum
      values: ["approve", "reject"]
      required: true
    rejection_comment:
      type: text
      required: false
      required_when: "decision == 'reject'"
      hint: "Required if rejecting — explain what must change"

  edges:
    - to: ra.rejection
      condition: "response.get('decision') == 'reject'"
    - to: ra.approved
