node:
  id: ts.verify-fix
  prompt: "Verify the fix resolved the issue."
  context: "Before declaring victory, verify that the original symptom is gone. Check from the user's perspective, not just the server's perspective."

  evidence_schema:
    users_can_access:
      type: enum
      values: ["yes", "no"]
      required: true
    error_rate_normal:
      type: enum
      values: ["yes", "no", "improving"]
      required: true
    monitoring_confirms:
      type: enum
      values: ["yes", "no"]
      required: true

  edges:
    - to: ts.resolved
      condition: "response.get('users_can_access') == 'yes'"
    - to: ts.still-broken
