node:
  id: rca.contain-failed
  prompt: "Containment failed. Escalate and try a different approach."
  context: >
    The initial containment action did not reduce the harm. Consider more
    aggressive measures: full rollback, service shutdown, DNS failover, or
    escalation to infrastructure/on-call teams. Document the escalation.

  evidence_schema:
    escalation_target:
      type: text
      required: true
      hint: "Who or what team was escalated to?"
    revised_action:
      type: text
      required: true
      hint: "What stronger containment action was applied?"
    now_contained:
      type: enum
      values: ["yes", "no"]
      required: true

  edges:
    - to: rca.timeline
      condition: "response.get('now_contained') == 'yes'"
    - to: rca.contain-failed
      condition: "response.get('now_contained') == 'no'"
