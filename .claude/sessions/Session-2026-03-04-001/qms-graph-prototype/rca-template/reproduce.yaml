node:
  id: rca.reproduce
  prompt: "Attempt to reproduce the failure."
  context: >
    Try to reproduce the exact failure in a non-production environment using
    the conditions identified in the timeline. Define the specific inputs,
    state, and sequence of operations required. If reproduction is intermittent,
    identify the variables that affect reliability (load, timing, data shape,
    concurrency). A failure you cannot reproduce is a failure you cannot
    confidently fix.

  evidence_schema:
    environment_used:
      type: text
      required: true
      hint: "What environment did you attempt reproduction in?"
    reproduction_steps:
      type: text
      required: true
      hint: "Exact steps taken to reproduce"
    reproduced:
      type: enum
      values: ["yes", "intermittent", "no"]
      required: true
      hint: "Were you able to reproduce the failure?"
    reproduction_notes:
      type: text
      required: false
      hint: "What variables affected reproduction reliability?"

  edges:
    - to: rca.isolate
      condition: "response.get('reproduced') in ['yes', 'intermittent']"
    - to: rca.reproduce-failed
