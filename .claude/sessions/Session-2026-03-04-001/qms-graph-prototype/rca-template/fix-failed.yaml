node:
  id: rca.fix-failed
  prompt: "Fix did not resolve the failure. Reassess."
  context: >
    The proposed fix did not resolve the reproduced failure. This may indicate
    the root cause analysis was incomplete or incorrect. Decide whether to
    revise the fix, re-examine the root cause, or go back to fault isolation.

  evidence_schema:
    why_fix_failed:
      type: text
      required: true
      hint: "Why didn't the fix work? What was observed?"
    next_step:
      type: enum
      values: ["revise-fix", "re-examine-root-cause", "re-isolate"]
      required: true
      hint: "Where should you go back to?"

  edges:
    - to: rca.fix
      condition: "response.get('next_step') == 'revise-fix'"
    - to: rca.root-cause
      condition: "response.get('next_step') == 're-examine-root-cause'"
    - to: rca.isolate
